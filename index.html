<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Time Attack - Silverstone Garage</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 12px 12px 0 0;
            overflow: hidden;
            background: #222;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            background: rgba(0,0,0,0.8);
            padding: 12px 18px;
            border-radius: 6px;
            border-left: 4px solid #00e676;
        }
        .ui-row { margin-bottom: 5px; }
        .ui-row:last-child { margin-bottom: 0; }
        #bestLap { color: #00b0ff; }
        #currentLap { color: #fff; }
        #wallet { color: #ffd700; font-size: 18px; }
        #status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: #ff3333;
            background: rgba(0,0,0,0.85);
            padding: 8px 20px;
            border-radius: 20px;
            display: none;
            pointer-events: none;
            letter-spacing: 1px;
        }
        #cornerName {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #ffea00;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 6px;
            pointer-events: none;
        }
        
        /* Shop Layout Styling */
        #garageShop {
            width: 1000px;
            background: #1e1e1e;
            box-sizing: border-box;
            padding: 20px;
            border-radius: 0 0 12px 12px;
            border-top: 2px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .shop-item {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            width: 28%;
            border: 1px solid #444;
        }
        .shop-item h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #00b0ff;
            text-transform: uppercase;
        }
        .shop-item .level {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .shop-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .shop-btn:hover {
            background: #ffea00;
            transform: scale(1.03);
        }
        .shop-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
        #lapFeedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            animation: fadeUp 1.5s ease-out forwards;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1.1); }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="ui">
        <div class="ui-row">Coins: <span id="wallet">0</span></div>
        <div class="ui-row">Best Lap: <span id="bestLap">--:--.--</span></div>
        <div class="ui-row">Current: <span id="currentLap">00:00.00</span></div>
        <div class="ui-row">Last Lap: <span id="lastLap">--:--.--</span></div>
    </div>
    
    <div id="cornerName">Hamilton Straight</div>
    <div id="status">OFF TRACK - PENALTY SPEED</div>
    <div id="lapFeedback"></div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
</div>

<div id="garageShop">
    <div class="shop-item">
        <h3>Top Speed</h3>
        <div class="level" id="speedLvl">Level: 1 / 5</div>
        <button class="shop-btn" id="speedBtn" onclick="buyUpgrade('speed')">Upgrade (15 Coins)</button>
    </div>
    <div class="shop-item">
        <h3>Acceleration</h3>
        <div class="level" id="accelLvl">Level: 1 / 5</div>
        <button class="shop-btn" id="accelBtn" onclick="buyUpgrade('accel')">Upgrade (10 Coins)</button>
    </div>
    <div class="shop-item">
        <h3>Handling</h3>
        <div class="level" id="handlingLvl">Level: 1 / 5</div>
        <button class="shop-btn" id="handlingBtn" onclick="buyUpgrade('handling')">Upgrade (10 Coins)</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// UI Elements
const currentLapEl = document.getElementById('currentLap');
const bestLapEl = document.getElementById('bestLap');
const lastLapEl = document.getElementById('lastLap');
const statusEl = document.getElementById('status');
const cornerNameEl = document.getElementById('cornerName');
const walletEl = document.getElementById('wallet');
const lapFeedbackEl = document.getElementById('lapFeedback');

// Currency & Upgrade Systems
let coins = 0;
let isLapClean = true; // Flips to false if you touch the grass

const upgrades = {
    speed: { lvl: 1, max: 5, cost: 15, base: 2.0, step: 0.50 },
    accel: { lvl: 1, max: 5, cost: 10, base: 0.04, step: 0.02 },
    handling: { lvl: 1, max: 5, cost: 10, base: 0.05, step: 0.015 }
};

// Timing State
let startTime = Date.now();
let lastLapTime = null;
let bestLapTime = null;
const totalCheckpoints = 4;
let passedCheckpoints = new Set();

// Input
const keys = { w: false, a: false, s: false, d: false };

// --- TRUE SILVERSTONE LAYOUT VERTICES ---
const trackWaypoints = [
    { x: 330, y: 500, name: "Hamilton Straight" }, 
    { x: 500, y: 510, name: "Abbey" },
    { x: 580, y: 540, name: "Farm Curve" },
    { x: 620, y: 450, name: "Village" },
    { x: 550, y: 410, name: "The Loop" },
    { x: 490, y: 440, name: "Aintree" },
    { x: 220, y: 310, name: "Wellington Straight" },
    { x: 120, y: 260, name: "Brooklands" },
    { x: 100, y: 170, name: "Luffield" },
    { x: 190, y: 140, name: "Woodcote" },
    { x: 380, y: 140, name: "National Pit Straight" },
    { x: 560, y: 90, name: "Copse" },
    { x: 690, y: 100, name: "Maggots" },
    { x: 770, y: 150, name: "Becketts" },
    { x: 800, y: 210, name: "Chapel" },
    { x: 650, y: 380, name: "Hangar Straight" },
    { x: 540, y: 450, name: "Stowe" },
    { x: 390, y: 370, name: "Vale" },
    { x: 280, y: 420, name: "Club Corner" }
];
const TRACK_WIDTH = 40; 

const checkpoints = [
    { x: 550, y: 410, r: 40, id: 1 }, 
    { x: 100, y: 170, r: 40, id: 2 }, 
    { x: 560, y: 90, r: 40, id: 3 }, 
    { x: 800, y: 210, r: 40, id: 4 }  
];

const finishLine = { x: 320, y: 475, w: 10, h: 50 };

// Car Attributes linked to baseline upgrades
const car = {
    x: 330,
    y: 500,
    w: 16,
    h: 9,
    angle: 0.1, 
    speed: 0,
    offTrackMaxSpeed: 0.3, 
    decel: 0.05,
    vx: 0,
    vy: 0,
    isOffTrack: false
};

// Controls listeners
window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true;
});
window.addEventListener('keyup', (e) => {
    if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false;
});

function formatTime(ms) {
    if (!ms) return "--:--.--";
    const min = Math.floor(ms / 60000).toString().padStart(2, '0');
    const sec = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
    const cs = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
    return `${min}:${sec}.${cs}`;
}

function drawTrackPath(context) {
    context.beginPath();
    context.moveTo(trackWaypoints[0].x, trackWaypoints[0].y);
    for (let i = 1; i < trackWaypoints.length; i++) {
        context.lineTo(trackWaypoints[i].x, trackWaypoints[i].y);
    }
    context.closePath();
}

function updatePhysics() {
    // Dynamic Stats calculated directly from Upgrade Levels
    const currentMaxSpeed = upgrades.speed.base + ((upgrades.speed.lvl - 1) * upgrades.speed.step);
    const currentAccel = upgrades.accel.base + ((upgrades.accel.lvl - 1) * upgrades.accel.step);
    const currentHandling = upgrades.handling.base + ((upgrades.handling.lvl - 1) * upgrades.handling.step);

    ctx.lineWidth = TRACK_WIDTH;
    drawTrackPath(ctx);
    car.isOffTrack = !ctx.isPointInStroke(car.x, car.y);

    const allowedMaxSpeed = car.isOffTrack ? car.offTrackMaxSpeed : currentMaxSpeed;
    
    if (car.isOffTrack) {
        statusEl.style.display = 'block';
        isLapClean = false; // Ruined clean status for this lap
    } else {
        statusEl.style.display = 'none';
    }

    // Acceleration & Braking
    if (keys.w) {
        car.speed = Math.min(car.speed + currentAccel, allowedMaxSpeed);
    } else if (keys.s) {
        car.speed = Math.max(car.speed - currentAccel, -allowedMaxSpeed / 2);
    } else {
        car.speed *= (1 - car.decel);
        if (Math.abs(car.speed) < 0.01) car.speed = 0;
    }

    // Steering
    if (Math.abs(car.speed) > 0.05) {
        const turnDir = car.speed > 0 ? 1 : -1;
        if (keys.a) car.angle -= currentHandling * turnDir;
        if (keys.d) car.angle += currentHandling * turnDir;
    }

    car.vx = Math.cos(car.angle) * car.speed;
    car.vy = Math.sin(car.angle) * car.speed;

    car.x += car.vx;
    car.y += car.vy;

    // Track Dynamic Corner Names
    let closestWaypoint = trackWaypoints[0];
    let minDist = Infinity;
    trackWaypoints.forEach(wp => {
        const d = Math.hypot(car.x - wp.x, car.y - wp.y);
        if (d < minDist) {
            minDist = d;
            closestWaypoint = wp;
        }
    });
    cornerNameEl.innerText = closestWaypoint.name;

    // Check Checkpoints
    checkpoints.forEach(cp => {
        const dist = Math.hypot(car.x - cp.x, car.y - cp.y);
        if (dist < cp.r) {
            passedCheckpoints.add(cp.id);
        }
    });

    // Handle Finish Line Crossing
    if (car.x >= finishLine.x && car.x <= finishLine.x + finishLine.w &&
        car.y >= finishLine.y && car.y <= finishLine.y + finishLine.h) {
        
        if (passedCheckpoints.size === totalCheckpoints) {
            const lapTime = Date.now() - startTime;
            lastLapTime = lapTime;
            lastLapEl.innerText = formatTime(lastLapTime);

            // Trigger Payout if clean
            if (isLapClean) {
                coins += 10;
                walletEl.innerText = coins;
                showFeedback("+10 COINS (CLEAN LAP)", "#ffd700");
            } else {
                showFeedback("DIRTY LAP - NO COINS", "#ff3333");
            }

            if (!bestLapTime || lapTime < bestLapTime) {
                bestLapTime = lapTime;
                bestLapEl.innerText = formatTime(bestLapTime);
            }
            
            // Reset lap context
            startTime = Date.now();
            passedCheckpoints.clear();
            isLapClean = true; // reset tracker for next lap
            updateShopUI();
        }
    }

    const currentElapsed = Date.now() - startTime;
    currentLapEl.innerText = formatTime(currentElapsed);
}

function showFeedback(text, color) {
    lapFeedbackEl.innerText = text;
    lapFeedbackEl.style.color = color;
    lapFeedbackEl.style.display = 'block';
    
    // Reset DOM animation node trick
    lapFeedbackEl.style.animation = 'none';
    lapFeedbackEl.offsetHeight; 
    lapFeedbackEl.style.animation = null;
}

function buyUpgrade(type) {
    const item = upgrades[type];
    if (coins >= item.cost && item.lvl < item.max) {
        coins -= item.cost;
        item.lvl++;
        item.cost += 10; // increase cost incrementally for balance
        walletEl.innerText = coins;
        updateShopUI();
    }
}

function updateShopUI() {
    for (const key in upgrades) {
        const item = upgrades[key];
        const lvlEl = document.getElementById(`${key}Lvl`);
        const btnEl = document.getElementById(`${key}Btn`);
        
        if (item.lvl >= item.max) {
            lvlEl.innerText = `Level: MAX`;
            btnEl.innerText = `FULLY UPGRADED`;
            btnEl.disabled = true;
        } else {
            lvlEl.innerText = `Level: ${item.lvl} / ${item.max}`;
            btnEl.innerText = `Upgrade (${item.cost} Coins)`;
            btnEl.disabled = coins < item.cost;
        }
    }
}

function draw() {
    ctx.fillStyle = '#1b5e20';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Kerbs edge lines
    ctx.save();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = TRACK_WIDTH + 6;
    ctx.setLineDash([15, 15]);
    drawTrackPath(ctx);
    ctx.stroke();
    ctx.strokeStyle = '#d32f2f';
    ctx.lineWidth = TRACK_WIDTH + 6;
    ctx.setLineDash([15, 15]);
    ctx.lineDashOffset = 15;
    drawTrackPath(ctx);
    ctx.stroke();
    ctx.restore();

    // Asphalt Main Surface
    ctx.save();
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = TRACK_WIDTH;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    drawTrackPath(ctx);
    ctx.stroke();
    ctx.restore();

    // Racing line guide
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    drawTrackPath(ctx);
    ctx.stroke();
    ctx.restore();

    // Checkered Finish Gate
    ctx.fillStyle = '#fff';
    ctx.fillRect(finishLine.x, finishLine.y, finishLine.w, finishLine.h);
    ctx.fillStyle = '#000';
    for(let i=0; i<finishLine.h; i+=5) {
        if(i % 10 === 0) ctx.fillRect(finishLine.x, finishLine.y + i, finishLine.w/2, 5);
        else ctx.fillRect(finishLine.x + finishLine.w/2, finishLine.y + i, finishLine.w/2, 5);
    }

    // Car Body Render
    ctx.save();
    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);

    ctx.fillStyle = '#000';
    ctx.fillRect(-car.w/2 + 2, -car.h/2 - 1, 4, 1);
    ctx.fillRect(car.w/2 - 6, -car.h/2 - 1, 4, 1);
    ctx.fillRect(-car.w/2 + 2, car.h/2, 4, 1);
    ctx.fillRect(car.w/2 - 6, car.h/2, 4, 1);

    ctx.fillStyle = car.isOffTrack ? '#ef5350' : '#00e676'; 
    ctx.fillRect(-car.w / 2, -car.h / 2, car.w, car.h);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(1, -car.h/2 + 1, 3, car.h - 2);
    ctx.fillStyle = '#111111';
    ctx.fillRect(-4, -car.h/2 + 1, 5, car.h - 2);

    ctx.restore();
}

function gameLoop() {
    updatePhysics();
    draw();
    requestAnimationFrame(gameLoop);
}

// Initial Kickoff Setup
updateShopUI();
gameLoop();
</script>

</body>
</html>
