<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Time Attack - Multi-Circuit Championship</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 12px 12px 0 0;
            overflow: hidden;
            background: #222;
            width: 1000px;
            height: 600px;
        }
        canvas {
            display: block;
        }
        
        /* Menu Screens styling */
        #introScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.96);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #introScreen h1 {
            font-size: 38px;
            margin-bottom: 5px;
            color: #ff3333;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255,51,51,0.3);
        }
        #introScreen p {
            color: #aaa;
            margin-bottom: 35px;
            font-size: 16px;
        }
        .track-grid {
            display: flex;
            gap: 25px;
            width: 95%;
            justify-content: center;
        }
        .track-card {
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            width: 270px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .track-card:hover {
            border-color: #00e676;
            transform: translateY(-8px);
            background: #252525;
            box-shadow: 0 8px 25px rgba(0,230,118,0.25);
        }
        .track-preview-canvas {
            background: #0f0f0f;
            border-radius: 8px;
            margin: 15px 0;
            display: block;
            border: 1px solid #222;
        }
        .track-card h3 {
            margin: 0;
            font-size: 18px;
            color: #00b0ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .track-desc {
            font-size: 13px;
            color: #ffea00;
            margin: 5px 0 0 0;
            font-style: italic;
        }
        .track-meta {
            font-size: 12px;
            color: #777;
            margin-top: 8px;
            border-top: 1px solid #2a2a2a;
            padding-top: 8px;
        }

        /* Gameplay Running Overlay */
        #ui {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            background: rgba(0,0,0,0.85);
            padding: 12px 18px;
            border-radius: 6px;
            border-left: 4px solid #00e676;
            z-index: 5;
        }
        .ui-row { margin-bottom: 5px; }
        .ui-row:last-child { margin-bottom: 0; }
        #bestLap { color: #00b0ff; }
        #currentLap { color: #fff; }
        #wallet { color: #ffd700; font-size: 18px; }
        #status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: #ff3333;
            background: rgba(0,0,0,0.85);
            padding: 8px 20px;
            border-radius: 20px;
            display: none;
            pointer-events: none;
            letter-spacing: 1px;
            z-index: 5;
        }
        #cornerName {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #ffea00;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 6px;
            pointer-events: none;
            z-index: 5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #menuBtn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #555;
            color: #fff;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            z-index: 5;
        }
        #menuBtn:hover {
            background: #777;
        }
        #resetUIBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #e57373;
            color: #000;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            z-index: 5;
        }
        #resetUIBtn:hover {
            background: #ff3333;
            color: #fff;
        }
        
        /* Upgrade Hub Layout */
        #garageShop {
            width: 1000px;
            background: #1e1e1e;
            box-sizing: border-box;
            padding: 20px;
            border-radius: 0 0 12px 12px;
            border-top: 2px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .shop-item {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            width: 28%;
            border: 1px solid #444;
        }
        .shop-item h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #00b0ff;
            text-transform: uppercase;
        }
        .shop-item .level {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .shop-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .shop-btn:hover {
            background: #ffea00;
            transform: scale(1.03);
        }
        .shop-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
        #lapFeedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            animation: fadeUp 1.5s ease-out forwards;
            z-index: 5;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1.1); }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="introScreen">
        <h1>Select Your Circuit</h1>
        <p>Choose a configuration profile below to match your car's setup</p>
        <div class="track-grid" id="trackGrid"></div>
    </div>

    <div id="ui">
        <div class="ui-row">Coins: <span id="wallet">0</span></div>
        <div class="ui-row">Best Lap: <span id="bestLap">--:--.--</span></div>
        <div class="ui-row">Current: <span id="currentLap">00:00.00</span></div>
        <div class="ui-row">Last Lap: <span id="lastLap">--:--.--</span></div>
    </div>
    
    <div id="cornerName">Hamilton Straight</div>
    <div id="status">OFF TRACK - PENALTY SPEED</div>
    <div id="lapFeedback"></div>
    <button id="menuBtn" onclick="returnToMenu()">Exit (M)</button>
    <button id="resetUIBtn" onclick="resetLap()">Reset (R)</button>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>
</div>

<div id="garageShop">
    <div class="shop-item">
        <h3>Top Speed</h3>
        <div class="level" id="speedLvl">Level: 1 / 5</div>
        <button class="shop-btn" id="speedBtn" onclick="buyUpgrade('speed')">Upgrade (15 Coins)</button>
    </div>
    <div class="shop-item">
        <h3>Acceleration</h3>
        <div class="level" id="accelLvl">Level: 1 / 5</div>
        <button class="shop-btn" id="accelBtn" onclick="buyUpgrade('accel')">Upgrade (10 Coins)</button>
    </div>
    <div class="shop-item">
        <h3>Handling</h3>
        <div class="level" id="handlingLvl">Level: 1 / 5</div>
        <button class="shop-btn" id="handlingBtn" onclick="buyUpgrade('handling')">Upgrade (10 Coins)</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let isGameRunning = false;

// Dynamic Track Geometry Data Storage
let trackWaypoints = [];
let checkpoints = [];
let finishLineGate = {}; 
let currentTrackWidth = 40;

// Scenery Cache
let grandstands = [];
let calculatedSceneryTrees = [];

// UI Elements
const currentLapEl = document.getElementById('currentLap');
const bestLapEl = document.getElementById('bestLap');
const lastLapEl = document.getElementById('lastLap');
const statusEl = document.getElementById('status');
const cornerNameEl = document.getElementById('cornerName');
const walletEl = document.getElementById('wallet');
const lapFeedbackEl = document.getElementById('lapFeedback');
const introScreenEl = document.getElementById('introScreen');
const trackGridEl = document.getElementById('trackGrid');

// Economy & Tune Systems
let coins = 0;
let isLapClean = true; 

const upgrades = {
    speed: { lvl: 1, max: 5, cost: 15, base: 2.1, step: 0.55 },
    accel: { lvl: 1, max: 5, cost: 10, base: 0.06, step: 0.02 }, 
    handling: { lvl: 1, max: 5, cost: 10, base: 0.05, step: 0.015 }
};

// Timing Mechanics
let startTime = 0;
let lastLapTime = null;
let bestLapTime = null;
let passedCheckpoints = new Set();
let gateCrossedLastFrame = false; 

// Ghost Analytics arrays
let currentLapHistory = [];  
let bestLapHistory = [];     
let ghostFrameIndex = 0;     

const keys = { w: false, a: false, s: false, d: false };

// Player Physics Model
const car = {
    x: 0, y: 0,
    w: 24, h: 12, 
    angle: 0, speed: 0,
    offTrackMaxSpeed: 0.7, decel: 0.05,
    vx: 0, vy: 0, isOffTrack: false
};

function generateDistinctTracks() {
    return [
        // TRACK 1: HIGH SPEED SUPER OVAL RING
        {
            id: 0,
            name: "Monza Oval Ring",
            desc: "Ultra-wide straights. Maximize top speed.",
            width: 52,
            waypoints: [
                { x: 200, y: 480, name: "Main Straight" },
                { x: 500, y: 490, name: "Kink" },
                { x: 820, y: 450, name: "Curva Grande" },
                { x: 860, y: 300, name: "Ascari Banking" },
                { x: 780, y: 140, name: "Biassono Sweep" },
                { x: 500, y: 110, name: "Back Straight" },
                { x: 160, y: 150, name: "Lesmo Curve" },
                { x: 120, y: 320, name: "Parabolica entry" }
            ]
        },
        // TRACK 2: TECHNICAL STREET CIRCUIT
        {
            id: 1,
            name: "Marina Bay Street",
            desc: "Narrow, twisty, and claustrophobic.",
            width: 32,
            waypoints: [
                { x: 180, y: 500, name: "Pit Straight" },
                { x: 420, y: 510, name: "Turn 1 Chicane" },
                { x: 440, y: 410, name: "Turn 2 Apex" },
                { x: 320, y: 390, name: "Hotel Section" },
                { x: 300, y: 290, name: "The Fountain Sharp Left" },
                { x: 520, y: 270, name: "Bridge Burst" },
                { x: 580, y: 180, name: "Bay Hairpin" },
                { x: 740, y: 160, name: "Esplanade Turn" },
                { x: 880, y: 260, name: "East Tunnel" },
                { x: 840, y: 460, name: "Sling Hairpin" },
                { x: 640, y: 440, name: "Complex Left" },
                { x: 620, y: 340, name: "Complex Right" },
                { x: 120, y: 220, name: "Grandstand Sweeper" },
                { x: 100, y: 380, name: "Final Corner" }
            ]
        },
        // TRACK 3: CLASSIC BALANCE GRAND PRIX
        {
            id: 2,
            name: "Spa-Francorchamps Apex",
            desc: "Long sectors, sweeps, and a heavy hairpin.",
            width: 40,
            waypoints: [
                { x: 250, y: 500, name: "Start Straight" },
                { x: 550, y: 510, name: "Eau Rouge Sweep" },
                { x: 880, y: 440, name: "Raidillon Climb" },
                { x: 850, y: 220, name: "Kemmel Straight" },
                { x: 600, y: 180, name: "Les Combes" },
                { x: 480, y: 240, name: "Malmedy" },
                { x: 420, y: 120, name: "Rivage Hairpin" },
                { x: 220, y: 140, name: "Pouhon Double-Left" },
                { x: 90,  y: 240, name: "Fagnes Corner" },
                { x: 120, y: 380, name: "Bus Stop Chicane" }
            ]
        }
    ];
}

function initializeSelectedCircuit(selectedTrack) {
    trackWaypoints = selectedTrack.waypoints;
    currentTrackWidth = selectedTrack.width;

    // 1. ALIGNED AND ROTATED FINISH LINE GATES
    const p1 = trackWaypoints[0];
    const p2 = trackWaypoints[1];
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const straightAngle = Math.atan2(dy, dx);

    const midX = p1.x + dx * 0.35;
    const midY = p1.y + dy * 0.35;
    const perpAngle = straightAngle + Math.PI / 2;
    const extentX = Math.cos(perpAngle) * (currentTrackWidth / 2 + 4);
    const extentY = Math.sin(perpAngle) * (currentTrackWidth / 2 + 4);

    finishLineGate = {
        midX: midX, midY: midY,
        x1: midX - extentX, y1: midY - extentY, 
        x2: midX + extentX, y2: midY + extentY, 
        angle: straightAngle
    };

    // Place vehicle behind finish line gate facing forward
    car.x = midX - Math.cos(straightAngle) * 35;
    car.y = midY - Math.sin(straightAngle) * 35;
    car.angle = straightAngle;
    car.speed = 0; car.vx = 0; car.vy = 0;

    // 2. ADAPTIVE SPLIT CHECKPOINTS
    checkpoints = [];
    const step = Math.floor(trackWaypoints.length / 4);
    for (let i = 1; i <= 4; i++) {
        let index = Math.min(i * step, trackWaypoints.length - 1);
        let wp = trackWaypoints[index];
        checkpoints.push({ x: wp.x, y: wp.y, r: currentTrackWidth + 10, id: i });
    }

    // 3. ADAPTIVE ENVIRONMENT LAYOUT SCENERY SEEDING
    grandstands = [];
    calculatedSceneryTrees = [];

    // Place viewing grandstands on the outside margins of corner segments
    for (let s = 1; s < trackWaypoints.length; s += 3) {
        let currentWp = trackWaypoints[s];
        let nextWp = trackWaypoints[(s + 1) % trackWaypoints.length];
        let segAng = Math.atan2(nextWp.y - currentWp.y, nextWp.x - currentWp.x);
        
        grandstands.push({
            x: currentWp.x + Math.cos(segAng + Math.PI/2) * (currentTrackWidth + 22),
            y: currentWp.y + Math.sin(segAng + Math.PI/2) * (currentTrackWidth + 22),
            w: 80, h: 18, angle: segAng
        });
    }

    // Dense vs scattered forest parameters based on track profile type
    const treeCount = selectedTrack.id === 1 ? 40 : 180; // Fewer trees for street track, more for forest tracks
    for (let i = 0; i < treeCount; i++) {
        let tx = Math.random() * 1000;
        let ty = Math.random() * 600;
        
        // Ensure tree coordinates do not spawn overlapping straight inside driving track surfaces
        ctx.lineWidth = currentTrackWidth + 30;
        drawTrackPath(ctx);
        if (!ctx.isPointInStroke(tx, ty)) {
            calculatedSceneryTrees.push({
                x: tx, y: ty,
                size: 5 + Math.random() * 8
            });
        }
    }

    introScreenEl.style.display = 'none';
    isGameRunning = true;
    startTime = Date.now();
    passedCheckpoints.clear();
    gateCrossedLastFrame = false;
    currentLapHistory = [];
    bestLapHistory = [];
    bestLapTime = null;
    bestLapEl.innerText = "--:--.--";
    lastLapEl.innerText = "--:--.--";
}

function buildMenuInteractivity() {
    const tracksPool = generateDistinctTracks();
    trackGridEl.innerHTML = "";

    tracksPool.forEach(tr => {
        const card = document.createElement('div');
        card.className = 'track-card';
        card.innerHTML = `
            <h3>${tr.name}</h3>
            <div class="track-desc">${tr.desc}</div>
            <canvas id="prevCanvas_${tr.id}" class="track-preview-canvas" width="230" height="130"></canvas>
            <div class="track-meta">Track Width: ${tr.width}px &bull; Points: ${tr.waypoints.length}</div>
        `;
        
        card.onclick = () => initializeSelectedCircuit(tr);
        trackGridEl.appendChild(card);

        const pCanvas = document.getElementById(`prevCanvas_${tr.id}`);
        const pCtx = pCanvas.getContext('2d');
        
        pCtx.fillStyle = '#0f0f0f';
        pCtx.fillRect(0,0,230,130);

        pCtx.save();
        pCtx.strokeStyle = '#333';
        pCtx.lineWidth = tr.width * (230/1000);
        pCtx.lineCap = "round"; pCtx.lineJoin = "round";
        pCtx.scale(230 / 1000, 130 / 600); 
        
        pCtx.beginPath();
        pCtx.moveTo(tr.waypoints[0].x, tr.waypoints[0].y);
        for(let w=1; w<tr.waypoints.length; w++) {
            pCtx.lineTo(tr.waypoints[w].x, tr.waypoints[w].y);
        }
        pCtx.closePath();
        pCtx.stroke();
        
        pCtx.strokeStyle = '#00b0ff';
        pCtx.lineWidth = 3;
        pCtx.stroke();
        pCtx.restore();
    });
}

function returnToMenu() {
    isGameRunning = false;
    introScreenEl.style.display = 'flex';
    buildMenuInteractivity();
}

// Controls listeners
window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'r') resetLap(); 
    if (e.key.toLowerCase() === 'm') returnToMenu(); 
});
window.addEventListener('keyup', (e) => {
    if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false;
});

function formatTime(ms) {
    if (!ms) return "--:--.--";
    const min = Math.floor(ms / 60000).toString().padStart(2, '0');
    const sec = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
    const cs = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
    return `${min}:${sec}.${cs}`;
}

function drawTrackPath(context) {
    context.beginPath();
    context.moveTo(trackWaypoints[0].x, trackWaypoints[0].y);
    for (let i = 1; i < trackWaypoints.length; i++) {
        context.lineTo(trackWaypoints[i].x, trackWaypoints[i].y);
    }
    context.closePath();
}

function resetLap() {
    if (!isGameRunning) return;
    
    const straightAngle = finishLineGate.angle;
    car.x = finishLineGate.midX - Math.cos(straightAngle) * 35;
    car.y = finishLineGate.midY - Math.sin(straightAngle) * 35;
    car.angle = straightAngle;
    car.speed = 0; car.vx = 0; car.vy = 0;
    
    startTime = Date.now();
    passedCheckpoints.clear();
    currentLapHistory = [];
    ghostFrameIndex = 0;
    isLapClean = true;
    gateCrossedLastFrame = true; 
    
    showFeedback("LAP RESET", "#00b0ff");
}

function checkLineIntersection(x1, y1, x2, y2, x3, y3, x4, y4) {
    const det = (x2 - x1) * (y4 - y3) - (y2 - y1) * (x4 - x3);
    if (det === 0) return false; 
    const lambda = ((y4 - y3) * (x4 - x1) + (x3 - x4) * (y4 - y1)) / det;
    const gamma = ((y1 - y2) * (x4 - x1) + (x2 - x1) * (y4 - y1)) / det;
    return (0 < lambda && lambda < 1) && (0 < gamma && gamma < 1);
}

function updatePhysics() {
    if (!isGameRunning) return;

    const currentMaxSpeed = upgrades.speed.base + ((upgrades.speed.lvl - 1) * upgrades.speed.step);
    const currentAccel = upgrades.accel.base + ((upgrades.accel.lvl - 1) * upgrades.accel.step);
    const currentHandling = upgrades.handling.base + ((upgrades.handling.lvl - 1) * upgrades.handling.step);

    ctx.lineWidth = currentTrackWidth;
    drawTrackPath(ctx);
    car.isOffTrack = !ctx.isPointInStroke(car.x, car.y);

    const allowedMaxSpeed = car.isOffTrack ? car.offTrackMaxSpeed : currentMaxSpeed;
    
    if (car.isOffTrack) {
        statusEl.style.display = 'block';
        isLapClean = false; 
    } else {
        statusEl.style.display = 'none';
    }

    if (keys.w) {
        car.speed = Math.min(car.speed + currentAccel, allowedMaxSpeed);
    } else if (keys.s) {
        car.speed = Math.max(car.speed - currentAccel, -allowedMaxSpeed / 2);
    } else {
        car.speed *= (1 - car.decel);
        if (Math.abs(car.speed) < 0.01) car.speed = 0;
    }

    if (Math.abs(car.speed) > 0.05) {
        const turnDir = car.speed > 0 ? 1 : -1;
        const dynamicHandling = car.isOffTrack ? currentHandling * 1.4 : currentHandling; 
        
        if (keys.a) car.angle -= dynamicHandling * turnDir;
        if (keys.d) car.angle += dynamicHandling * turnDir;
    }

    const oldX = car.x;
    const oldY = car.y;

    car.vx = Math.cos(car.angle) * car.speed;
    car.vy = Math.sin(car.angle) * car.speed;
    car.x += car.vx;
    car.y += car.vy;

    currentLapHistory.push({ x: car.x, y: car.y, angle: car.angle });

    if (bestLapHistory.length > 0 && ghostFrameIndex < bestLapHistory.length - 1) {
        ghostFrameIndex++;
    }

    let closestWaypoint = trackWaypoints[0];
    let minDist = Infinity;
    trackWaypoints.forEach(wp => {
        const d = Math.hypot(car.x - wp.x, car.y - wp.y);
        if (d < minDist) {
            minDist = d;
            closestWaypoint = wp;
        }
    });
    cornerNameEl.innerText = closestWaypoint.name;

    checkpoints.forEach(cp => {
        const dist = Math.hypot(car.x - cp.x, car.y - cp.y);
        if (dist < cp.r) passedCheckpoints.add(cp.id);
    });

    const crossedGateThisFrame = checkLineIntersection(
        oldX, oldY, car.x, car.y,
        finishLineGate.x1, finishLineGate.y1, finishLineGate.x2, finishLineGate.y2
    );

    if (crossedGateThisFrame) {
        if (!gateCrossedLastFrame) {
            if (passedCheckpoints.size === 4) {
                const lapTime = Date.now() - startTime;
                lastLapTime = lapTime;
                lastLapEl.innerText = formatTime(lastLapTime);

                if (isLapClean) {
                    coins += 10;
                    walletEl.innerText = coins;
                    showFeedback("+10 COINS (CLEAN LAP)", "#ffd700");
                } else {
                    showFeedback("DIRTY LAP - NO COINS", "#ff3333");
                }

                if (!bestLapTime || lapTime < bestLapTime) {
                    bestLapTime = lapTime;
                    bestLapEl.innerText = formatTime(bestLapTime);
                    bestLapHistory = [...currentLapHistory];
                }
                
                startTime = Date.now();
                passedCheckpoints.clear();
                currentLapHistory = [];
                ghostFrameIndex = 0;
                isLapClean = true; 
                updateShopUI();
            } else {
                showFeedback("MISSED CHECKPOINTS", "#ff9100");
            }
        }
        gateCrossedLastFrame = true;
    } else {
        gateCrossedLastFrame = false;
    }

    const currentElapsed = Date.now() - startTime;
    currentLapEl.innerText = formatTime(currentElapsed);
}

function showFeedback(text, color) {
    lapFeedbackEl.innerText = text;
    lapFeedbackEl.style.color = color;
    lapFeedbackEl.style.display = 'block';
    lapFeedbackEl.style.animation = 'none';
    lapFeedbackEl.offsetHeight; 
    lapFeedbackEl.style.animation = null;
}

function buyUpgrade(type) {
    const item = upgrades[type];
    if (coins >= item.cost && item.lvl < item.max) {
        coins -= item.cost;
        item.lvl++;
        item.cost += 10; 
        walletEl.innerText = coins;
        updateShopUI();
    }
}

function updateShopUI() {
    for (const key in upgrades) {
        const item = upgrades[key];
        const lvlEl = document.getElementById(`${key}Lvl`);
        const btnEl = document.getElementById(`${key}Btn`);
        
        if (item.lvl >= item.max) {
            lvlEl.innerText = `Level: MAX`;
            btnEl.innerText = `FULLY UPGRADED`;
            btnEl.disabled = true;
        } else {
            lvlEl.innerText = `Level: ${item.lvl} / ${item.max}`;
            btnEl.innerText = `Upgrade (${item.cost} Coins)`;
            btnEl.disabled = coins < item.cost;
        }
    }
}

function drawF1Car(x, y, angle, primaryColor, isGhost) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = isGhost ? 0.25 : 1.0;

    const w = car.w; const h = car.h;

    ctx.fillStyle = '#000000';
    if (isGhost) ctx.fillStyle = 'rgba(0, 176, 255, 0.4)'; 

    ctx.fillRect(w * 0.15, -h * 0.65, w * 0.18, h * 0.3); 
    ctx.fillRect(w * 0.15, h * 0.35, w * 0.18, h * 0.3);  
    ctx.fillRect(w * 0.22, -h * 0.4, w * 0.04, h * 0.8);  

    ctx.fillRect(-w * 0.4, -h * 0.65, w * 0.22, h * 0.35); 
    ctx.fillRect(-w * 0.4, h * 0.3, w * 0.22, h * 0.35);   
    ctx.fillRect(-w * 0.3, -h * 0.4, w * 0.04, h * 0.8);   

    ctx.fillStyle = primaryColor;
    if (isGhost) {
        ctx.fillStyle = 'rgba(0, 176, 255, 0.2)';
        ctx.strokeStyle = 'rgba(0, 176, 255, 0.6)';
        ctx.lineWidth = 1;
    }

    ctx.beginPath();
    ctx.arc(w * 0.4, 0, h * 0.15, 0, Math.PI * 2);
    ctx.fill();
    if (isGhost) ctx.stroke();

    ctx.fillRect(-w * 0.4, -h * 0.15, w * 0.8, h * 0.3);
    if (isGhost) ctx.strokeRect(-w * 0.4, -h * 0.15, w * 0.8, h * 0.3);

    ctx.beginPath();
    ctx.roundRect(w * 0.3, -h * 0.55, w * 0.08, h * 1.1, h * 0.1);
    ctx.fill();
    if (isGhost) ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(w * 0.15, -h * 0.15); ctx.lineTo(w * 0.15, -h * 0.4); ctx.lineTo(-w * 0.2, -h * 0.4); ctx.lineTo(-w * 0.2, -h * 0.15);
    ctx.closePath(); ctx.fill(); if (isGhost) ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(w * 0.15, h * 0.15); ctx.lineTo(w * 0.15, h * 0.4); ctx.lineTo(-w * 0.2, h * 0.4); ctx.lineTo(-w * 0.2, h * 0.15);
    ctx.closePath(); ctx.fill(); if (isGhost) ctx.stroke();

    ctx.fillRect(-w * 0.5, -h * 0.5, w * 0.12, h * 1.0);
    if (isGhost) ctx.strokeRect(-w * 0.5, -h * 0.5, w * 0.12, h * 1.0);

    ctx.fillStyle = '#000000';
    if (isGhost) ctx.fillStyle = 'rgba(0, 176, 255, 0.5)';
    ctx.beginPath();
    ctx.roundRect(-w * 0.05, -h * 0.15, w * 0.22, h * 0.3, h * 0.12);
    ctx.fill();

    ctx.restore();
}

function draw() {
    if (!isGameRunning) return;

    // Background Grass
    ctx.fillStyle = '#1b5e20';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Static environmental Tree foliage
    calculatedSceneryTrees.forEach(tree => {
        ctx.fillStyle = '#114411';
        ctx.beginPath(); ctx.arc(tree.x + 2, tree.y + 3, tree.size, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#2e7d32';
        ctx.beginPath(); ctx.arc(tree.x, tree.y, tree.size, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4caf50';
        ctx.beginPath(); ctx.arc(tree.x - (tree.size * 0.15), tree.y - (tree.size * 0.15), tree.size * 0.5, 0, Math.PI * 2); ctx.fill();
    });

    // Grandstand Structures
    grandstands.forEach(gs => {
        ctx.save();
        ctx.translate(gs.x, gs.y);
        ctx.rotate(gs.angle);

        ctx.fillStyle = '#424242';
        ctx.fillRect(-gs.w / 2, -gs.h / 2, gs.w, gs.h);
        ctx.strokeStyle = '#eeeeee';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-gs.w / 2, -gs.h / 2, gs.w, gs.h);

        const rowCount = 3;
        const rowHeight = gs.h / rowCount;
        const colors = ['#e53935', '#00b0ff', '#ffeb3b', '#ffffff'];

        for (let r = 0; r < rowCount; r++) {
            const currentY = -gs.h / 2 + (r * rowHeight);
            ctx.fillStyle = '#616161';
            ctx.fillRect(-gs.w / 2 + 2, currentY + 1, gs.w - 4, 2);

            for (let seatX = -gs.w / 2 + 6; seatX < gs.w / 2 - 6; seatX += 5) {
                if (((seatX + r) * 7) % 10 > 2) {
                    ctx.fillStyle = colors[Math.abs(Math.floor(seatX + r)) % colors.length];
                    ctx.fillRect(seatX, currentY + 2, 3, 3);
                }
            }
        }
        ctx.restore();
    });

    // Rumble Curbs Layout
    ctx.save();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = currentTrackWidth + 6; ctx.setLineDash([15, 15]);
    drawTrackPath(ctx); ctx.stroke();
    ctx.strokeStyle = '#d32f2f'; ctx.lineWidth = currentTrackWidth + 6; ctx.setLineDash([15, 15]); ctx.lineDashOffset = 15;
    drawTrackPath(ctx); ctx.stroke();
    ctx.restore();

    // Core Asphalt Surface
    ctx.save();
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = currentTrackWidth;
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    drawTrackPath(ctx);
    ctx.stroke();
    ctx.restore();

    // Checkered Finish Gate
    ctx.save();
    ctx.translate(finishLineGate.midX, finishLineGate.midY);
    ctx.rotate(finishLineGate.angle);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-4, -currentTrackWidth/2 - 2, 8, currentTrackWidth + 4);
    
    ctx.fillStyle = '#000000';
    const blockSz = 4;
    for (let gy = -currentTrackWidth/2 - 2; gy < currentTrackWidth/2 + 2; gy += blockSz) {
        ctx.fillRect(-4, gy, blockSz, blockSz);
        ctx.fillRect(0, gy + blockSz/2, blockSz, blockSz);
    }
    ctx.restore();

    // Draw Ghost
    if (bestLapHistory.length > 0 && bestLapHistory[ghostFrameIndex]) {
        const ghost = bestLapHistory[ghostFrameIndex];
        drawF1Car(ghost.x, ghost.y, ghost.angle, '', true);
    }

    // Draw Live Competitor Chassis
    const activeColor = car.isOffTrack ? '#ef5350' : '#ff0000'; 
    drawF1Car(car.x, car.y, car.angle, activeColor, false);
}

function gameLoop() {
    updatePhysics();
    draw();
    requestAnimationFrame(gameLoop);
}

// Boot setup script routines
updateShopUI();
buildMenuInteractivity();
gameLoop();
</script>
